name: PR Validation

on:
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  MINIMUM_COVERAGE: 40

jobs:
  validate:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Check formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
      
    - name: Install Coverage Tools
      run: dotnet tool install -g dotnet-reportgenerator-globaltool
      
    - name: Generate Coverage Report
      id: generate_report
      continue-on-error: true
      run: |
        reportgenerator \
          -reports:./coverage/**/coverage.cobertura.xml \
          -targetdir:./coverage-report \
          -reporttypes:"Html;JsonSummary;MarkdownSummaryGithub"
        
    - name: Calculate Coverage
      id: coverage
      if: always()
      continue-on-error: true
      run: |
        if [ -f ./coverage-report/Summary.json ]; then
          COVERAGE=$(cat ./coverage-report/Summary.json | grep -oP '"linecoverage":\s*\K[\d.]+' | head -1)
          if [ -z "$COVERAGE" ]; then
            COVERAGE="0"
          fi
        else
          echo "⚠️ Coverage report not found"
          COVERAGE="0"
        fi
        
        echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "📊 Code Coverage: $COVERAGE%"
        
    - name: Validate Coverage
      if: always()
      run: |
        COVERAGE=${{ steps.coverage.outputs.coverage }}
        MINIMUM=${{ env.MINIMUM_COVERAGE }}
        
        if [ -z "$COVERAGE" ] || [ "$COVERAGE" = "0" ]; then
          echo "❌ Coverage calculation failed or no tests found"
          exit 1
        fi
        
        if (( $(echo "$COVERAGE < $MINIMUM" | bc -l) )); then
          echo "❌ Coverage $COVERAGE% is below minimum $MINIMUM%"
          exit 1
        else
          echo "✅ Coverage $COVERAGE% meets minimum requirement"
        fi
        
    - name: Comment PR with Coverage
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const fs = require('fs');
          const coverage = '${{ steps.coverage.outputs.coverage }}' || '0';
          const minimum = '${{ env.MINIMUM_COVERAGE }}';
          const coverageNum = parseFloat(coverage);
          const minimumNum = parseFloat(minimum);
          
          let status = '❌';
          let statusMessage = '';
          
          if (!coverage || coverage === '0') {
            status = '⚠️';
            statusMessage = 'Coverage calculation failed - no coverage data available';
          } else if (coverageNum >= minimumNum) {
            status = '✅';
            statusMessage = `Coverage ${coverage}% meets minimum requirement of ${minimum}%`;
          } else {
            status = '❌';
            statusMessage = `Coverage ${coverage}% is below minimum requirement of ${minimum}%`;
          }
          
          let markdownReport = '';
          try {
            if (fs.existsSync('./coverage-report/SummaryGithub.md')) {
              markdownReport = fs.readFileSync('./coverage-report/SummaryGithub.md', 'utf8');
            } else {
              markdownReport = '> No detailed coverage report available. Check the test execution logs for errors.';
            }
          } catch (e) {
            markdownReport = `> Error reading coverage report: ${e.message}`;
          }
          
          const comment = `## ${status} Test Coverage Report
          
          **Status:** ${statusMessage}
          **Coverage:** ${coverage || 'N/A'}% (Minimum: ${minimum}%)
          
          ${markdownReport}
          `;
          
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
          
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: ./coverage-report/

  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Run Code Analysis
      run: dotnet build --configuration Release --no-restore /p:EnforceCodeStyleInBuild=true